<div class="sidebar-container">
  <div class="sidebar-header">
    <div class="logo-container">
      <img src="assets/images/logo-transporteur.png" class="logo-img" alt="Transport Moez">
    </div>
    <h2 class="company-name">TRANSPORT<br>MOEZ</h2>
  </div>

  <mat-divider></mat-divider>

  <nav class="sidebar-nav">
    <button mat-button 
            (click)="navigateAndClose('/mes-voyages')" 
            routerLinkActive="active"
            class="nav-btn">
      <mat-icon>local_shipping</mat-icon>
      <span>Mes voyages</span>
    </button>

    <button mat-button 
            (click)="navigateAndClose('/ajouter-voyage')" 
            routerLinkActive="active"
            class="nav-btn">
      <mat-icon>add_circle</mat-icon>
      <span>Ajouter voyage</span>
    </button>

    <button *ngIf="isSuperAdmin" 
            mat-button 
            (click)="navigateAndClose('/points-geographiques')" 
            routerLinkActive="active"
            class="nav-btn">
      <mat-icon>place</mat-icon>
      <span>Points géographiques</span>
    </button>

    <!-- Séparateur avant déconnexion -->
    <div class="nav-separator"></div>

    <!-- Bouton Déconnexion intégré dans la navigation -->
    <button mat-button 
            (click)="logout()" 
            class="nav-btn logout-nav-btn">
      <mat-icon>logout</mat-icon>
      <span>Déconnexion</span>
    </button>
  </nav>
</div>
